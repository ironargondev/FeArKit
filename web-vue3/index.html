<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeArKit</title>
  <link rel="stylesheet" href="./vendor/css/element-plus.css">
  <link rel="stylesheet" href="./vendor/css/xterm.css">
  <link rel="stylesheet" href="./vendor/css/fontawesome.min.css">
  <script type="importmap">
  {
    "imports": {
      "vue":                         "./vendor/js/vue.esm.js",
      "vue-router":                  "./vendor/js/vue-router.esm.js",
      "element-plus":                "./vendor/js/element-plus.esm.js",
      "@element-plus/icons-vue":     "./vendor/js/element-plus-icons.esm.js",
      "@xterm/xterm":                "./vendor/js/xterm.esm.js",
      "@xterm/addon-fit":            "./vendor/js/xterm-addon-fit.esm.js",
      "@xterm/addon-web-links":      "./vendor/js/xterm-addon-web-links.esm.js",
      "codemirror":                  "./vendor/js/codemirror.esm.js",
      "@codemirror/state":           "./vendor/js/codemirror-state.esm.js",
      "@codemirror/view":            "./vendor/js/codemirror-view.esm.js",
      "@codemirror/language":        "./vendor/js/codemirror-language.esm.js",
      "@codemirror/commands":        "./vendor/js/codemirror-commands.esm.js",
      "@codemirror/autocomplete":    "./vendor/js/codemirror-autocomplete.esm.js",
      "@codemirror/lint":            "./vendor/js/codemirror-lint.esm.js",
      "@codemirror/search":          "./vendor/js/codemirror-search.esm.js",
      "@codemirror/lang-javascript": "./vendor/js/codemirror-lang-javascript.esm.js",
      "@codemirror/lang-python":     "./vendor/js/codemirror-lang-python.esm.js",
      "@codemirror/lang-html":       "./vendor/js/codemirror-lang-html.esm.js",
      "@codemirror/lang-css":        "./vendor/js/codemirror-lang-css.esm.js",
      "@codemirror/lang-json":       "./vendor/js/codemirror-lang-json.esm.js",
      "@codemirror/lang-markdown":   "./vendor/js/codemirror-lang-markdown.esm.js",
      "zmodem.js":                   "./vendor/js/zmodem.esm.js"
    }
  }
  </script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { height: 100%; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createApp, defineAsyncComponent } from 'vue';
    import * as Vue from 'vue';
    import * as VueRouter from 'vue-router';
    import ElementPlus from 'element-plus';
    import * as ElementPlusNS from 'element-plus';
    import * as ElementPlusIconsVue from '@element-plus/icons-vue';
    import * as XTermNS from '@xterm/xterm';
    import * as FitAddonNS from '@xterm/addon-fit';
    import * as WebLinksAddonNS from '@xterm/addon-web-links';
    import * as CodeMirrorNS from 'codemirror';
    import * as CMStateNS from '@codemirror/state';
    import * as CMViewNS from '@codemirror/view';
    import * as CMLanguageNS from '@codemirror/language';
    import * as CMCommandsNS from '@codemirror/commands';
    import * as CMAutocompleteNS from '@codemirror/autocomplete';
    import * as CMLintNS from '@codemirror/lint';
    import * as CMSearchNS from '@codemirror/search';
    import * as LangJsNS from '@codemirror/lang-javascript';
    import * as LangPyNS from '@codemirror/lang-python';
    import * as LangHtmlNS from '@codemirror/lang-html';
    import * as LangCssNS from '@codemirror/lang-css';
    import * as LangJsonNS from '@codemirror/lang-json';
    import * as LangMdNS from '@codemirror/lang-markdown';
    import * as ZmodemNS from 'zmodem.js';
    import { loadModule } from './vendor/js/vue3-sfc-loader.esm.js';
    import { createAppRouter } from './src/router/index.js';

    const BASE_URL = new URL('./', import.meta.url).href;

    // ── Inline src/api/request.js ────────────────────────────────────────────
    // Defined here so vue3-sfc-loader finds it in moduleCache and never tries
    // to fetch it from the server (avoids the need to rebuild the binary after
    // editing this utility file during development).
    function _buildRequestModule() {
      function request(url, data, headers, ext) {
        const _headers = { 'Content-Type': 'application/x-www-form-urlencoded', ...(headers ?? {}) };
        const body = data ? new URLSearchParams(flattenParams(data)).toString() : undefined;
        return fetch(url, { method: 'POST', headers: _headers, body }).then(async res => {
          let responseData;
          if ((ext ?? {}).responseType === 'arraybuffer') {
            responseData = await res.arrayBuffer();
          } else {
            try { responseData = await res.json(); }
            catch { responseData = await res.text(); }
          }
          return { data: responseData, status: res.status };
        });
      }
      function post(url, data, ext) {
        const form = document.createElement('form');
        form.action = url; form.method = 'POST'; form.target = '_self';
        Object.assign(form, ext ?? {});
        for (const [key, val] of Object.entries(data ?? {})) {
          if (Array.isArray(val)) {
            for (const v of val) { const i = document.createElement('input'); i.name = key; i.value = v; form.appendChild(i); }
          } else { const i = document.createElement('input'); i.name = key; i.value = val; form.appendChild(i); }
        }
        document.body.appendChild(form); form.submit(); form.remove();
      }
      function flattenParams(obj) {
        const out = {};
        for (const [k, v] of Object.entries(obj ?? {})) { if (v !== null && v !== undefined) out[k] = String(v); }
        return out;
      }
      function getBaseURL(ws, suffix) {
        const scheme = location.protocol === 'https:' ? (ws ? 'wss' : 'https') : (ws ? 'ws' : 'http');
        return `${scheme}://${location.host}${location.pathname}${suffix}`;
      }
      function waitTime(ms = 100) { return new Promise(resolve => setTimeout(resolve, ms)); }
      function formatSize(size) {
        size = isNaN(size) ? 0 : Math.max(Number(size) || 0, 0);
        if (size === 0) return '0 B';
        const k = 1024, i = Math.floor(Math.log(size) / Math.log(k));
        const units = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
        return (Math.round((size / Math.pow(k, i)) * 100) / 100) + ' ' + (units[i] ?? 'B');
      }
      function tsToTime(ts) {
        if (isNaN(ts)) return 'Unknown';
        return `${Math.floor(ts / 3600)}h ${Math.floor((ts % 3600) / 60)}m`;
      }
      function renderUnixEpochToHumanReadable(epoch) {
        if (epoch === undefined) epoch = Date.now();
        if (typeof epoch !== 'number' || isNaN(epoch)) return 'Invalid';
        if (epoch < 1e12) epoch *= 1000;
        const absDiff = Math.abs(epoch - Date.now());
        return `${Math.floor(absDiff / 3600000)}h ${Math.floor((absDiff % 3600000) / 60000)}m`;
      }
      function genRandHex(len) { return [...Array(len)].map(() => Math.floor(Math.random() * 16).toString(16)).join(''); }
      function hex2ua(hex) {
        if (typeof hex !== 'string') return new Uint8Array([]);
        const list = hex.match(/.{1,2}/g); return list ? new Uint8Array(list.map(b => parseInt(b, 16))) : new Uint8Array([]);
      }
      function ua2hex(buf) { return Array.prototype.map.call(buf, b => ('00' + b.toString(16)).slice(-2)).join(''); }
      function str2ua(str) { return new TextEncoder().encode(str); }
      function ua2str(buf) { return new TextDecoder().decode(buf); }
      function hex2str(hex) { return ua2str(hex2ua(hex)); }
      function str2hex(str) { return ua2hex(new TextEncoder().encode(str)); }
      function encrypt(data, secret) {
        const buf = data instanceof Uint8Array ? new Uint8Array(data) : data;
        for (let i = 0; i < buf.length; i++) buf[i] ^= secret[i % secret.length];
        return buf;
      }
      function decrypt(data, secret) {
        const buf = new Uint8Array(data);
        for (let i = 0; i < buf.length; i++) buf[i] ^= secret[i % secret.length];
        return ua2str(buf);
      }
      let _collator;
      try { _collator = new Intl.Collator(navigator.language, { numeric: true, sensitivity: 'base' }); } catch (_) {}
      const orderCompare = _collator ? _collator.compare.bind(_collator) : (a, b) => String(a).localeCompare(String(b));
      function stripI18n(msg) {
        if (!msg) return msg;
        return msg.replace(/\$\{i18n\|([^}]+)\}/g, (_, key) => {
          const label = key.split('.').pop();
          return label.split('_').map(w => w[0] + w.slice(1).toLowerCase()).join(' ');
        });
      }
      return { request, post, flattenParams, getBaseURL, waitTime, formatSize, tsToTime,
               renderUnixEpochToHumanReadable, genRandHex, hex2ua, ua2hex, str2ua, ua2str,
               hex2str, str2hex, encrypt, decrypt, orderCompare, stripI18n };
    }
    const _requestModule = _buildRequestModule();

    // Module cache: prevents vue3-sfc-loader from re-fetching CDN packages used in .vue <script> blocks
    const moduleCache = {
      'vue':                         Vue,
      'vue-router':                  VueRouter,
      'element-plus':                ElementPlusNS,
      '@element-plus/icons-vue':     ElementPlusIconsVue,
      '@xterm/xterm':                XTermNS,
      '@xterm/addon-fit':            FitAddonNS,
      '@xterm/addon-web-links':      WebLinksAddonNS,
      'codemirror':                  CodeMirrorNS,
      '@codemirror/state':           CMStateNS,
      '@codemirror/view':            CMViewNS,
      '@codemirror/language':        CMLanguageNS,
      '@codemirror/commands':        CMCommandsNS,
      '@codemirror/autocomplete':    CMAutocompleteNS,
      '@codemirror/lint':            CMLintNS,
      '@codemirror/search':          CMSearchNS,
      '@codemirror/lang-javascript': LangJsNS,
      '@codemirror/lang-python':     LangPyNS,
      '@codemirror/lang-html':       LangHtmlNS,
      '@codemirror/lang-css':        LangCssNS,
      '@codemirror/lang-json':       LangJsonNS,
      '@codemirror/lang-markdown':   LangMdNS,
      'zmodem.js':                   ZmodemNS,
    };

    // Register request.js by its resolved URL so all relative imports from .vue files hit the cache
    moduleCache[new URL('./src/api/request.js', import.meta.url).href] = _requestModule;

    // Register prebuilt.js — vue3-sfc-loader parses .js with sourceType:"script" which
    // rejects ESM export syntax, so we cache the value here instead of letting it fetch the file.
    moduleCache[new URL('./src/config/prebuilt.js', import.meta.url).href] = { default: [
      { value: 'linux',   label: 'Linux',   children: [
          { value: 'arm',   label: 'arm'   },
          { value: 'arm64', label: 'arm64' },
          { value: 'i386',  label: 'i386'  },
          { value: 'amd64', label: 'amd64' },
      ]},
      { value: 'windows', label: 'Windows', children: [
          { value: 'arm64', label: 'arm64' },
          { value: 'i386',  label: 'i386'  },
          { value: 'amd64', label: 'amd64' },
      ]},
      { value: 'darwin',  label: 'Darwin',  children: [
          { value: 'arm64', label: 'arm64' },
          { value: 'amd64', label: 'amd64' },
      ]},
    ]};

    const sfcOptions = {
      moduleCache,
      pathResolve({ refPath, relPath }, _opts) {
        if (refPath === undefined) return relPath;
        if (relPath[0] !== '.') return relPath;
        return new URL(relPath, refPath).href;
      },
      async getFile(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status} ${res.statusText}`);
        return res.text();
      },
      addStyle(css) {
        const style = document.createElement('style');
        style.textContent = css;
        document.head.appendChild(style);
      },
      log(type, ...args) {
        if (type !== 'debug') console[type]?.(...args);
      },
    };

    // Helper: wrap a .vue path into a defineAsyncComponent
    const loadSFC = (relPath) =>
      defineAsyncComponent({
        loader: () => loadModule(BASE_URL + relPath, sfcOptions),
        timeout: 15000,
      });

    // Build router (views are loaded lazily via vue3-sfc-loader)
    const router = createAppRouter(path => loadModule(BASE_URL + path, sfcOptions));

    // Load root App component, then boot
    const AppComp = await loadModule(BASE_URL + 'src/App.vue', sfcOptions);
    const app = createApp(AppComp);

    app.use(ElementPlus);
    app.use(router);

    // Register all feature dialog components globally so Home.vue can use them by name
    const dialogComponents = [
      'GenerateClient', 'Execute', 'Shellcode', 'Executable',
      'LoadElf', 'Keylog', 'ProcessManager', 'FileExplorer',
      'Terminal', 'Desktop', 'DeviceInfo',
    ];
    for (const name of dialogComponents) {
      app.component(name, loadSFC(`src/components/${name}.vue`));
    }

    // Register Element Plus icons globally
    for (const [name, icon] of Object.entries(ElementPlusIconsVue)) {
      app.component(name, icon);
    }

    app.mount('#app');
  </script>
</body>
</html>
